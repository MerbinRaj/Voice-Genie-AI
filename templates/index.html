<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Genie AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- TITLE -->
    <h1>🎤 Voice Genie AI</h1>

    <!-- MAIN CONTAINER -->
    <div class="container">

        <!-- ERROR MESSAGE -->
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <!-- TEXT TO SPEECH FORM -->
        <form method="POST" onsubmit="showLoading()">

            <label>Select Language:</label>

            <!-- LANGUAGE BUTTONS -->
            <div class="lang-buttons">
                <button type="button" onclick="selectLang('english', this)" class="active">English</button>
                <button type="button" onclick="selectLang('tamil', this)">Tamil</button>
                <button type="button" onclick="selectLang('malayalam', this)">Malayalam</button>
            </div>

            <!-- HIDDEN INPUT FOR SELECTED LANGUAGE -->
            <input type="hidden" name="language" id="language" value="english">

            <!-- TEXT AREA -->
            <textarea name="text" rows="4" placeholder="Enter your text..." required></textarea>

            <!-- SUBMIT BUTTON -->
            <button type="submit">Generate Audio</button>
        </form>

        <!-- LOADING INDICATOR -->
        <p id="loading" style="display:none;">Generating... ⏳</p>

        <!-- AUDIO PLAYER + DOWNLOAD -->
        {% if audio_file %}
            <audio controls>
                <source src="{{ url_for('serve_audio', filename=audio_file) }}" type="audio/mpeg">
            </audio>

            <br><br>
            <a href="{{ url_for('serve_audio', filename=audio_file) }}" download>
                <button type="button">Download Audio</button>
            </a>
        {% endif %}
    </div>

    <!-- SCRIPTS -->
    <script>
        // Show loading text while generating audio
        function showLoading() {
            document.getElementById("loading").style.display = "block";
        }

        // Select language buttons and set hidden input value
        function selectLang(lang, btn) {
            document.getElementById("language").value = lang;

            let buttons = document.querySelectorAll(".lang-buttons button");
            buttons.forEach(b => b.classList.remove("active"));

            btn.classList.add("active");
        }
    </script>
    <form action="{{ url_for('logout') }}" method="get">
    <button type="submit" class="logout-btn"> Logout</button>
</form>
    
</body>
</html>
